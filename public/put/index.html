<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro - CRUD</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="container">
        <h2>Editar Registro (PUT)</h2>

        <label>BUSCAR PELO CPF PARA EDITAR:</label>
        <input type="text" id="cpfBusca" placeholder="000.000.000-00" oninput="maskCPF(this)" maxlength="14">
        <button onclick="buscarParaEditar()">BUSCAR DADOS</button>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #000;">

        <div id="formularioEdicao">
            <input type="text" id="nome" placeholder="NOME">
            <input type="text" id="sobrenome" placeholder="SOBRENOME">
            <input type="email" id="email" placeholder="EMAIL">

            <div class="row">
                <input type="number" id="idade" placeholder="IDADE" oninput="maskIdade(this)">
                <input type="text" id="telefone" placeholder="(11)99999-9999" oninput="maskTel(this)">
            </div>

            <input type="text" id="rua" placeholder="RUA">

            <div class="row">
                <input type="text" id="bairro" placeholder="BAIRRO">
                <input type="text" id="cidade" placeholder="CIDADE">
                <input type="text" id="estado" placeholder="UF" oninput="maskEstado(this)" style="width: 80px;">
            </div>

            <button onclick="atualizarDados()">SALVAR ALTERAÇÕES</button>
        </div>

        <button class="btn-voltar" onclick="location.href='../'">VOLTAR AO MENU</button>
    </div>

    <script src="put.js"></script>

</body>

</html>
