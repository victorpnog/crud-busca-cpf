<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>POST - Cadastrar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Adicionar Registro (POST)</h2>
        <form id="formPost">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="text" id="sobrenome" placeholder="Sobrenome" required>
            <input type="text" id="cpf" placeholder="CPF" required>
            <input type="text" id="rg" placeholder="RG" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="number" id="idade" placeholder="Idade" required>
            <input type="text" id="telefone" placeholder="Telefone" required>
            <input type="text" id="rua" placeholder="Rua" required>
            <input type="text" id="bairro" placeholder="Bairro" required>
            <input type="text" id="cidade" placeholder="Cidade" required>
            <input type="text" id="estado" placeholder="Estado" required>
            <button type="button" onclick="enviarDados()">Cadastrar</button>
        </form>
        <nav>
            <a href="post.html">POST</a> | <a href="get.html">GET</a> |
            <a href="put.html">PUT</a> | <a href="delete.html">DELETE</a>
        </nav>
    </div>
    <script src="post/post.js"></script>
</body>

</html>
