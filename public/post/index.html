<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CRUD</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="container">
        <h2>Novo Cadastro (POST)</h2>

        <input type="text" id="nome" placeholder="NOME">
        <input type="text" id="sobrenome" placeholder="SOBRENOME">
        <input type="email" id="email" placeholder="EMAIL">

        <div class="row">
            <input type="number" id="idade" placeholder="IDADE" oninput="maskIdade(this)">
            <input type="text" id="telefone" placeholder="(11)99999-9999" oninput="maskTel(this)">
        </div>

        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #000;">

        <div class="row">
            <input type="text" id="cpf" placeholder="CPF" oninput="maskCPF(this)" maxlength="14">
            <input type="text" id="rg" placeholder="RG" oninput="maskRG(this)" maxlength="12">
        </div>

        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #000;">

        <input type="text" id="rua" placeholder="RUA">

        <div class="row">
            <input type="text" id="bairro" placeholder="BAIRRO">
            <input type="text" id="cidade" placeholder="CIDADE">
            <input type="text" id="estado" placeholder="UF" oninput="maskEstado(this)" style="width: 80px;">
        </div>

        <button onclick="enviarDados()">Finalizar Cadastro</button>
        <button class="btn-voltar" onclick="location.href='../'">Voltar ao Menu</button>
    </div>

    <script src="post.js"></script>

</body>

</html>
